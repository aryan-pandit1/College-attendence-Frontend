      <stop offset="0%" stop-color="#3D73FF"></stop>
      <stop offset="100%" stop-color="#2958D8"></stop>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="128" height="128" rx="30" fill="url(#bg)"></rect>

